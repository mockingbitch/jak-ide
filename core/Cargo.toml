[package]
name = "jakide-core"
version = "0.1.0"
edition = "2021"
description = "JakIDE Rust core — file engine, project management (axum HTTP sidecar)"

[[bin]]
name = "jakide-core"
path = "src/main.rs"

[dependencies]
axum = "0.7"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "signal"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = "z"
lto = true
strip = true

<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Input</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #252526;
        color: #ddd;
        margin: 0;
        padding: 16px;
        font-size: 13px;
      }
      label {
        display: block;
        margin-bottom: 8px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        background: #1e1e1e;
        color: #fff;
        border: 1px solid #444;
        border-radius: 4px;
        font: inherit;
      }
      .row {
        margin-top: 14px;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }
      button {
        padding: 6px 14px;
        border: 1px solid #444;
        border-radius: 4px;
        background: #333;
        color: #fff;
        cursor: pointer;
        font: inherit;
      }
      button.ok {
        background: #0e639c;
        border-color: #0e639c;
      }
    </style>
  </head>
  <body>
    <label id="label"></label>
    <input id="field" autofocus />
    <div class="row">
      <button id="cancel">Cancel</button>
      <button id="ok" class="ok">OK</button>
    </div>
    <script>
      const p = new URLSearchParams(location.search);
      document.title = p.get('title') || 'Input';
      document.getElementById('label').textContent = p.get('label') || '';
      const f = document.getElementById('field');
      if (p.get('password')) f.type = 'password';
      f.value = p.get('value') || '';
      f.focus();
      const submit = () => window.jakide.promptSubmit(f.value);
      const cancel = () => window.jakide.promptCancel();
      document.getElementById('ok').onclick = submit;
      document.getElementById('cancel').onclick = cancel;
      f.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') submit();
        if (e.key === 'Escape') cancel();
      });
    </script>
  </body>
</html>

appId: com.jakide.app
productName: JakIDE
copyright: Copyright © 2026 PhongTran
icon: assets/icons

# asar disabled keeps express.static + the bundled backend reading from the
# normal filesystem — simplest reliable setup for the MVP.
asar: false

directories:
  output: release

# Feeds electron-updater (see updater.js): where to look for new releases and
# what `npm run release` (electron-builder --publish always) uploads to.
# Auto-update only actually works for the AppImage target — see updater.js.
publish:
  provider: github
  owner: mockingbitch
  repo: jakide

files:
  - main.js
  - preload.js
  - prompt.html
  - "app/**/*"
  - "assets/**/*"
  - package.json

linux:
  target:
    - AppImage
    - deb
  category: Development
  maintainer: "PhongTran <jarvis.phongtran@gmail.com>"
  synopsis: "AI-first IDE"
  executableName: jakide
  artifactName: "${productName}-${version}.${ext}"
